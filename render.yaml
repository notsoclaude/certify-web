services:
  - type: web
    name: certify-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: certify-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: certify-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: certify-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: certify-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: certify-db
          property: password

databases:
  - name: certify-db
    plan: free
    databaseName: certify_db
    user: postgres
