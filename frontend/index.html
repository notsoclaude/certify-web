<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CERTify - Career. Explore. Ready. Talent.</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #f9fafb;
      color: #1f2937;
      line-height: 1.6;
    }
    
    /* TOP CENTER SYSTEM BAR */
    .system-status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      padding: 10px 20px;
      background: #1f2937;
      color: #e5e7eb;
      font-family: monospace;
      font-size: 0.85rem;
      z-index: 1000;
      border-bottom: 2px solid #374151;
    }
    
    .system-status-bar.healthy {
      border-bottom-color: #10b981;
    }
    
    .system-status-bar.unhealthy {
      border-bottom-color: #ef4444;
    }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b7280;
    }
    
    .status-dot.online {
      background: #10b981;
      box-shadow: 0 0 8px #10b981;
      animation: pulse 2s infinite;
    }
    
    .status-dot.offline {
      background: #ef4444;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Push content down so it doesn't hide under fixed bar */
    #root {
      padding-top: 40px;
    }
    
    /* Loading spinner */
    #root:empty::before {
      content: '';
      display: block;
      width: 40px;
      height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      position: fixed;
      top: 50%;
      left: 50%;
      margin-top: -20px;
      margin-left: -20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- TOP CENTER SYSTEM BAR -->
  <div class="system-status-bar" id="systemStatus">
    <div class="status-item">
      <span class="status-dot" id="apiDot"></span>
      <span id="apiStatus">API: Offline</span>
    </div>
    <div class="status-item">
      <span class="status-dot" id="dbDot"></span>
      <span id="dbStatus">DB: Checking...</span>
    </div>
    <div class="status-item">
      <span class="status-dot" id="etlDot"></span>
      <span id="etlStatus">ETL: Standby</span>
    </div>
    <div class="status-item">
      <span class="status-dot" id="msgDot"></span>
      <span id="msgStatus">Queue: Standby</span>
    </div>
  </div>

  <!-- React Root -->
  <div id="root"></div>
  
  <script type="module" src="/src/main.jsx"></script>
  
  <!-- System Health Check -->
  <script>
    async function checkSystem() {
      try {
        const res = await fetch('http://localhost:5000/api/stats');
        const data = await res.json();
        
        if (res.ok && data.status === 'success') {
          document.getElementById('systemStatus').classList.add('healthy');
          document.getElementById('apiDot').classList.add('online');
          document.getElementById('apiStatus').textContent = 'API: Online';
          document.getElementById('dbDot').classList.add('online');
          document.getElementById('dbStatus').textContent = 'DB: Connected';
        }
      } catch (e) {
        document.getElementById('systemStatus').classList.add('unhealthy');
      }
    }
    
    setTimeout(checkSystem, 1000);
  </script>
</body>
</html>
